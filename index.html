<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GADS - App Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050814">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#050814;
color:white;
text-align:center;
overflow-x:hidden;
}

/* SPLASH */
.splash{
position:fixed;
inset:0;
background:radial-gradient(circle at top,#0b1220,#050814);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
animation:fadeOut 2.5s ease forwards;
animation-delay:2.5s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

.splash img{
width:120px;
border-radius:25px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
50%{transform:scale(1.1);}
}

/* BACKGROUND */
.glow{
position:fixed;
width:600px;
height:600px;
background:linear-gradient(45deg,#00c6ff,#7f00ff,#00ffb3);
filter:blur(180px);
top:-200px;
left:-200px;
opacity:0.3;
animation:move 10s infinite alternate;
}

@keyframes move{
to{transform:translate(250px,200px);}
}

/* MAIN */
.container{
padding:60px 20px;
opacity:0;
animation:show 1s ease forwards;
animation-delay:2.8s;
position:relative;
z-index:2;
}

@keyframes show{to{opacity:1;}}

.logo{
width:140px;
border-radius:30px;
box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

h1{
font-size:44px;
margin-top:15px;
font-weight:800;
background:linear-gradient(90deg,#00c6ff,#7f00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{color:#cbd5e1;margin-top:8px;}

.card{
margin:35px auto;
max-width:420px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
}

.btn{
display:block;
margin-top:12px;
padding:15px;
border-radius:14px;
text-decoration:none;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

.green{background:linear-gradient(90deg,#00c853,#64dd17);color:white;}
.blue{background:linear-gradient(90deg,#2979ff,#00b0ff);color:white;}
.orange{background:linear-gradient(90deg,#ff6d00,#ff9100);color:white;}

.btn:hover{transform:scale(1.05);}

/* INSTALL BUTTON */
.install{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#00c6ff;
padding:12px 20px;
border-radius:30px;
color:black;
font-weight:800;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<div class="splash">
<img src="https://res.cloudinary.com/guahfikd/image/upload/f_auto,q_auto/694077_jvepa9">
</div>

<div class="glow"></div>

<div class="container">

<img class="logo" src="https://res.cloudinary.com/guahfikd/image/upload/f_auto,q_auto/694077_jvepa9">

<h1>GADS</h1>
<p>App tipo Play Store + Web App</p>

<div class="card">

<h3>📲 Descarga oficial</h3>

<a class="btn green" href="https://www.appcreator24.com/app4101161-9jzfhn" target="_blank">
⬇ Descargar App
</a>

<a class="btn orange" onclick="openWeb()">
🌐 Versión web
</a>

<a class="btn blue" href="https://www.appcreator24.com/app4101161-9jzfhn" target="_blank">
🔗 Enlace directo
</a>

</div>

</div>

<!-- BOTÓN INSTALAR -->
<div class="install" id="installBtn">📲 Instalar GADS</div>

<script>
let deferredPrompt;

function openWeb(){
window.location.href="https://gabrielll100.github.io/GADS/";
}

/* PWA INSTALL */
window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click",async ()=>{
document.getElementById("installBtn").style.display="none";
deferredPrompt.prompt();
deferredPrompt=null;
});
</script>

</body>
</html>
